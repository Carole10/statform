{% extends "base.html" %}


{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="card">
        <h1 class="text-3xl font-bold mb-8">{{ form.titre }}</h1>
        <form method="POST" action="/f/{{ form.id }}/submit" class="space-y-6">
            {% for champ in form.structure %}
            <div>
                <label class="block text-lg font-medium mb-2">{{ champ.label }}</label>
                <input name="{{ champ.nom }}" type="{{ champ.type }}" required class="input-field">
            </div>
            {% endfor %}
            <!-- <div class="h-captcha" data-sitekey="{{ sitekey }}"></div> -->
            <button type="submit" class="btn-primary w-full text-lg">Envoyer mes réponses</button>
        </form>
    </div>
</div>
{% endblock %}
