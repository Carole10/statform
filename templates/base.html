<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatsForm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
</head>

<body>
    <nav class="bg-white shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between">
            <a href="/" class="text-2xl font-bold text-blue-600">StatsForm</a>
            <!-- <div>
                <a href="/dashboard" class="mr-4">Dashboard</a>
                <a href="/new" class="btn-primary">+ Nouveau</a>
            </div> -->
            {% block fasterNavigation %}
            {% endblock %}
        </div>
    </nav>
    <main class="max-w-6xl mx-auto p-4 mt-8">
        {% block content %}
        {% if home %}
        <div class="text-center py-20">
            <h1 class="text-5xl font-bold mb-4">Crée. Collecte. Analyse.</h1>
            <p class="text-xl text-gray-600 mb-8">Formulaires + Stats auto en 1 clic. 100% Python.</p>
            <a href="/auth/register" class="btn-primary text-lg">Commencer gratuitement</a>
        </div>
        {% endif %}
        {% endblock %}
    </main>
</body>
<script>
    document.getElementById("loginForm").addEventListener("submit", async function (e) {
        e.preventDefault();
        const formData = new FormData(this);
        const body = new URLSearchParams(formData);

        const res = await fetch("/auth/cookie/login", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: body.toString()
        });

        if (res.ok) {
            window.location.href = "/dashboard";
        } else {
            const data = await res.json();
            alert(data.detail || "Email ou mot de passe incorrect");
        }
    });
</script>
</html>
<!-- templates/dashboard.html -->
