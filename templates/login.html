{% extends "base.html" %}

{% block fasterNavigation %}
<div>
    <a href="/dashboard" class="mr-4">Dashboard</a>
    <a href="/new" class="btn-primary">+ Nouveau</a>
</div>
{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="card">
        <h1 class="text-3xl font-bold mb-6 text-center">Connexion</h1>
        <form method="POST" action="/auth/cookie/login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <input name="username" type="email" required class="input-field">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Mot de passe</label>
                <input name="password" type="password" required class="input-field">
            </div>
            <button type="submit" class="btn-primary w-full">Se connecter</button>
        </form>
        <p class="text-center mt-4 text-sm">
            Pas de compte ? <a href="/auth/register" class="text-blue-600 font-semibold">Inscris-toi</a>
        </p>
    </div>
</div>



{% endblock %}
